<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UGC Production Tracker — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0d0d0b;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

/* ── Background grid ── */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.bg-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse at center,rgba(26,86,219,.15) 0%,transparent 70%);pointer-events:none}

/* ── Page layout ── */
.page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;position:relative;z-index:1}

/* ── Hero heading ── */
.hero-title{text-align:center;margin-bottom:52px}
.hero-line1{font-size:clamp(13px,1.4vw,16px);font-weight:600;color:rgba(255,255,255,.4);letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:12px}
.hero-line2{font-size:clamp(36px,5vw,58px);font-weight:700;color:#fff;letter-spacing:-2px;line-height:1.05;display:block;margin-bottom:0}
.hero-anim-wrap{position:relative;height:clamp(46px,6vw,72px);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:6px}
.anim-word{position:absolute;font-size:clamp(36px,5vw,58px);font-weight:700;letter-spacing:-2px;line-height:1;opacity:0;transform:translateY(64px);transition:opacity .45s ease,transform .45s cubic-bezier(.34,1.4,.64,1);background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.anim-word.active{opacity:1;transform:translateY(0)}
.anim-word.exit-up{opacity:0;transform:translateY(-64px)}

/* ── Login card ── */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;width:100%;max-width:380px;backdrop-filter:blur(12px)}
.card-title{font-size:18px;font-weight:600;color:#fff;margin-bottom:4px;text-align:center}
.card-sub{font-size:13px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:rgba(255,255,255,.5);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
.field input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s,background .15s}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field input:focus{border-color:rgba(26,86,219,.7);background:rgba(26,86,219,.08)}
.err{font-size:12px;color:#f87171;margin-top:8px;text-align:center;min-height:18px;opacity:0;transition:opacity .2s}
.err.show{opacity:1}
.btn-login{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#1a56db,#6d28d9);color:#fff;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:opacity .15s,transform .1s;letter-spacing:.2px}
.btn-login:hover{opacity:.9}
.btn-login:active{transform:scale(.98)}
.lock-icon{display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.lock-icon svg{width:32px;height:32px;color:rgba(255,255,255,.3)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="page">

  <!-- Animated heading -->
  <div class="hero-title">
    <span class="hero-line1">PocketFM &nbsp;&#8729;&nbsp; Internal Tool</span>
    <span class="hero-line2">UGC Production Tracker</span>
    <div class="hero-anim-wrap">
      <span class="anim-word" id="w0">Weekly</span>
      <span class="anim-word" id="w1">Monthly</span>
      <span class="anim-word" id="w2">Yearly</span>
    </div>
  </div>

  <!-- Login card -->
  <div class="card">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access the tracker</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="err" id="err">Incorrect username or password</div>
    <button class="btn-login" onclick="doLogin()">Log in</button>
  </div>

</div>

<script>
// ── Animated words ────────────────────────────────────────────
const words=['w0','w1','w2'];
let cur=0;
function tick(){
  document.getElementById(words[cur]).classList.remove('active');
  document.getElementById(words[cur]).classList.add('exit-up');
  setTimeout(()=>{document.getElementById(words[(cur)%3]).classList.remove('exit-up');},500);
  cur=(cur+1)%3;
  document.getElementById(words[cur]).classList.add('active');
}
document.getElementById(words[0]).classList.add('active');
setInterval(tick,2000);

// ── Login logic ───────────────────────────────────────────────
// Credentials — change these to your preferred username/password
const CREDS=[
  {u:'ugc',p:'tracker2026'},
  {u:'admin',p:'pocketfm2026'}
];
const SESSION_KEY='ugc_auth_v1';

function doLogin(){
  const u=document.getElementById('username').value.trim();
  const pw=document.getElementById('password').value;
  const err=document.getElementById('err');
  if(CREDS.some(c=>c.u===u&&c.p===pw)){
    sessionStorage.setItem(SESSION_KEY,'1');
    window.location.href='index.html';
  } else {
    err.classList.add('show');
    document.getElementById('password').value='';
    setTimeout(()=>err.classList.remove('show'),3000);
  }
}
</script>
</body>
</html>
