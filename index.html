<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UGC Production Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f2f1ed;--sf:#fff;--sf2:#f7f6f3;--bd:#e5e3db;--bds:#ccc9be;--tx:#18170f;--t2:#57554c;--t3:#9b9890;--blue:#1a56db;--blue-l:#eff4ff;--blue-b:#b4c8fd;--blue-t:#1e3a8a;--green:#047857;--green-l:#ecfdf5;--green-b:#6ee7b7;--green-t:#064e3b;--amber:#b45309;--amber-l:#fffbeb;--amber-b:#fcd34d;--amber-t:#78350f;--red:#dc2626;--red-t:#991b1b;--purple:#6d28d9;--purple-l:#f5f3ff;--purple-b:#c4b5fd;--purple-t:#4c1d95;--slate:#475569;--slate-l:#f1f5f9;--slate-t:#1e293b;--indigo:#4338ca;--indigo-l:#eef2ff;--indigo-t:#312e81;--teal:#0e7490;--teal-l:#ecfeff;--teal-t:#164e63}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
.topbar{background:var(--tx);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
.tb-l{display:flex;align-items:center;gap:8px}
.tb-logo{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
.tb-logo svg{width:13px;height:13px}
.tb-title{font-size:13px;font-weight:600;color:#fff}
.tb-tag{font-size:10px;color:rgba(255,255,255,.45);padding:2px 7px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}
.tb-r{display:flex;align-items:center;gap:8px}
.zoom-sel{padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.75);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;outline:none}
.tab-nav{background:var(--tx);padding:0 20px;display:flex;border-bottom:1px solid rgba(255,255,255,.1)}
.tab-btn{padding:9px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,.45);background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent}
.tab-btn.active{color:#fff;border-bottom-color:#fff}
.main{padding:18px 20px 60px;max-width:100%;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.tbl-l{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tbl-r{display:flex;align-items:center;gap:6px}
.filter-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--bds);background:var(--sf);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif}
.pill:hover{border-color:var(--blue);color:var(--blue)}
.pill.active{background:var(--tx);border-color:var(--tx);color:#fff}
.toggle-wrap{display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:8px;border:1px solid var(--bds);background:var(--sf);cursor:pointer;user-select:none;font-size:12px;font-weight:500;color:var(--t2)}
.toggle-wrap.on{background:var(--purple-l);border-color:var(--purple-b);color:var(--purple-t)}
.toggle-sw{width:26px;height:14px;border-radius:7px;background:var(--bds);position:relative;flex-shrink:0}
.toggle-sw::after{content:'';position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle-wrap.on .toggle-sw{background:var(--purple)}
.toggle-wrap.on .toggle-sw::after{transform:translateX(12px)}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-sm svg{width:13px;height:13px}
.grp-bar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:10px;padding:7px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:10px}
.grp-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.grp-btn{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--bds);background:var(--sf2);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:4px}
.grp-btn.on{color:#fff}
.grp-btn.on.g-ij{background:var(--slate);border-color:var(--slate)}
.grp-btn.on.g-km{background:var(--indigo);border-color:var(--indigo)}
.grp-btn.on.g-sc{background:var(--blue);border-color:var(--blue)}
.grp-btn.on.g-er{background:var(--green);border-color:var(--green)}
.grp-btn.on.g-pr{background:var(--amber);border-color:var(--amber)}
.grp-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.frow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.swrap{position:relative}
.swrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--t3);pointer-events:none}
.sinput{padding:5px 10px 5px 28px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--tx);outline:none;width:185px}
.ssel{padding:5px 9px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--t2);outline:none;cursor:pointer}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:8px;margin-bottom:14px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.si{width:24px;height:24px;border-radius:6px;background:var(--sf2);display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.si svg{width:12px;height:12px;color:var(--t2)}
.sl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sv{font-size:21px;font-weight:600;letter-spacing:-.5px;line-height:1.1}
.sv.c-blue{color:var(--blue)}.sv.c-green{color:var(--green)}.sv.c-amber{color:var(--amber)}
.tbl-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
thead tr.sr th{padding:6px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd);text-align:center}
.th-base{background:var(--sf2);color:var(--t3);text-align:left}
.th-ij{background:var(--slate-l);color:var(--slate-t);border-left:3px solid var(--slate)}
.th-km{background:var(--indigo-l);color:var(--indigo-t);border-left:3px solid var(--indigo)}
.th-sc{background:var(--blue-l);color:var(--blue-t);border-left:3px solid var(--blue)}
.th-er{background:var(--green-l);color:var(--green-t);border-left:3px solid var(--green)}
.th-pr{background:var(--amber-l);color:var(--amber-t);border-left:3px solid var(--amber)}
thead tr.cr th{padding:7px 8px;font-size:10px;font-weight:600;color:var(--t3);text-align:center;border-bottom:1px solid var(--bd);white-space:nowrap;background:var(--sf)}
thead tr.cr th.left{text-align:left}
.ch-ij{background:#f5f7fa;border-left:3px solid var(--slate)}.ch-ijc{background:#f5f7fa}
.ch-km{background:#f0f0fb;border-left:3px solid var(--indigo)}.ch-kmc{background:#f0f0fb}
.ch-sc{background:#f7f9ff;border-left:3px solid var(--blue)}.ch-scc{background:#f7f9ff}
.ch-er{background:#f5fdf9;border-left:3px solid var(--green)}.ch-erc{background:#f5fdf9}
.ch-pr{background:#fdfcf5;border-left:3px solid var(--amber)}.ch-prc{background:#fdfcf5}
.ch-ps{background:#edf0fb;border-left:2px dashed var(--blue);color:var(--purple-t);font-style:italic}
.ch-pe{background:#eaf4ee;border-left:2px dashed var(--green);color:var(--purple-t);font-style:italic}
.ch-pp{background:#f5efe0;border-left:2px dashed var(--amber);color:var(--purple-t);font-style:italic}
.ei{color:var(--blue);font-size:9px;margin-left:2px}
tbody tr{border-bottom:1px solid var(--bd)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:var(--sf2)!important}
td{padding:8px;vertical-align:middle;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.left{text-align:left}
.td-ij{background:#f5f7fa;border-left:3px solid var(--slate)}.td-ijc{background:#f5f7fa}
.td-km{background:#f0f0fb;border-left:3px solid var(--indigo)}.td-kmc{background:#f0f0fb}
.td-sc{background:#f9faff;border-left:3px solid var(--blue)}.td-scc{background:#f9faff}
.td-er{background:#f7fdfa;border-left:3px solid var(--green)}.td-erc{background:#f7fdfa}
.td-pr{background:#fdfdf6;border-left:3px solid var(--amber)}.td-prc{background:#fdfdf6}
.td-ps{background:#edf0fb;border-left:2px dashed var(--blue)}
.td-pe{background:#eaf4ee;border-left:2px dashed var(--green)}
.td-pp{background:#f5efe0;border-left:2px dashed var(--amber)}
.sn{font-weight:500;display:block;max-width:165px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.b-run{background:var(--green-l);color:var(--green-t);border:1px solid var(--green-b)}.b-run .dot{background:var(--green)}
.b-pau{background:var(--amber-l);color:var(--amber-t);border:1px solid var(--amber-b)}.b-pau .dot{background:var(--amber)}
.mu{color:var(--t3)}
.mn{font-family:'DM Mono',monospace;font-size:11px}
.mnb{font-weight:600;font-family:'DM Mono',monospace;font-size:11px}
.pv{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-t);font-style:italic}
.ec{display:flex;align-items:center;justify-content:center;gap:3px}
.ei2{width:54px;padding:2px 4px;border-radius:5px;font-size:11px;font-family:'DM Mono',monospace;border:1px solid var(--bds);background:transparent;color:var(--tx);text-align:center;outline:none}
.ei2:focus,.ei2.dirty{border-color:var(--blue);background:var(--blue-l)}
.ei2.ovr{border-color:var(--amber);background:var(--amber-l);color:var(--amber-t)}
.sb{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif}
.tfoot{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--bd);background:var(--sf2);flex-wrap:wrap;gap:5px}
.tft{font-size:10px;color:var(--t3)}
kbd{background:var(--bg);border:1px solid var(--bds);border-radius:3px;padding:1px 4px;font-family:'DM Mono',monospace;font-size:9px}
.ystats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.ytcard{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
table.ytbl{min-width:750px}
table.ytbl thead th{padding:8px 10px;font-size:10px;font-weight:600;color:var(--t3);background:var(--sf2);border-bottom:1px solid var(--bd);white-space:nowrap;text-align:center}
table.ytbl thead th.left{text-align:left}
.yh-sc{background:#dbe8ff;color:var(--blue-t)}.yh-er{background:#d4f5e6;color:var(--green-t)}
.yh-lv{background:#fef0cc;color:var(--amber-t)}.yh-wc{background:#ede8ff;color:var(--purple-t)}
.yh-dr{background:#ccf5fa;color:var(--teal-t)}
table.ytbl tbody tr{border-bottom:1px solid var(--bd)}
table.ytbl tbody tr:last-child{border-bottom:none}
table.ytbl tbody tr:hover td{background:var(--sf2)!important}
table.ytbl td{padding:8px 10px;text-align:center;white-space:nowrap}
table.ytbl td.left{text-align:left}
.yt-ttl{font-weight:500;max-width:200px;display:block;overflow:hidden;text-overflow:ellipsis}
.yt-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.yn{font-family:'DM Mono',monospace;font-size:11px;font-weight:500}
.y-bar{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.y-left{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.y-mp{display:flex;flex-direction:column;gap:2px}
.yp{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--bds);background:var(--sf);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif}
.yp:hover{border-color:var(--blue)}
.yp.single{background:var(--tx);border-color:var(--tx);color:#fff}
.yp.cmpa{background:var(--blue);border-color:var(--blue);color:#fff}
.yp.cmpb{background:var(--purple);border-color:var(--purple);color:#fff}
.ycbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--purple-l);border:1px solid var(--purple-b);border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--purple-t);flex-wrap:wrap}
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;background:var(--tx);color:#fff;opacity:0;transition:opacity .2s;pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>
<header class="topbar">
  <div class="tb-l">
    <div class="tb-logo"><svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity=".6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity=".6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity=".3"/></svg></div>
    <span class="tb-title">UGC Production Tracker</span>
    <span class="tb-tag" id="wtag"></span>
  </div>
  <div class="tb-r">
    <select class="zoom-sel" onchange="applyZoom(this.value)">
      <option value="1">100%</option><option value="0.9">90%</option><option value="0.8">80%</option><option value="0.75">75%</option><option value="0.6">60%</option><option value="0.5">50%</option>
    </select>
  </div>
</header>
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="weekly">Weekly Tracker</button>
  <button class="tab-btn" data-tab="yearly">Yearly Tracker</button>
</nav>
<main class="main">

<div class="tab-panel active" id="tab-weekly">
  <div class="toolbar">
    <div class="tbl-l">
      <div class="filter-pills" id="wpills"></div>
      <div class="toggle-wrap" id="prev-tog" onclick="togglePrev()"><div class="toggle-sw"></div><span>Last week targets</span></div>
    </div>
    <div class="tbl-r">
      <button class="btn-sm" onclick="exportCSV()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export CSV</button>
    </div>
  </div>
  <div class="grp-bar">
    <span class="grp-lbl">Columns:</span>
    <button class="grp-btn g-ij on" id="grp-ij" onclick="toggleGrp('ij')"><span class="grp-dot"></span>Scripts &amp; Duration</button>
    <button class="grp-btn g-km on" id="grp-km" onclick="toggleGrp('km')"><span class="grp-dot"></span>TTD Monthwise</button>
    <button class="grp-btn g-sc on" id="grp-sc" onclick="toggleGrp('sc')"><span class="grp-dot"></span>Scripting</button>
    <button class="grp-btn g-er on" id="grp-er" onclick="toggleGrp('er')"><span class="grp-dot"></span>ER Review</button>
    <button class="grp-btn g-pr on" id="grp-pr" onclick="toggleGrp('pr')"><span class="grp-dot"></span>Production</button>
  </div>
  <div class="frow">
    <div class="swrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="sinput" id="wsearch" type="text" placeholder="Search show name..." oninput="rWeekly()"></div>
    <select class="ssel" id="fstatus" onchange="rWeekly()"><option value="">All statuses</option><option value="Running">Running</option><option value="Paused">Paused</option></select>
    <select class="ssel" id="fpod" onchange="rWeekly()"><option value="">All POD leads</option></select>
    <select class="ssel" id="fwriter" onchange="rWeekly()"><option value="">All writers</option></select>
  </div>
  <div class="stats-grid" id="wstats"></div>
  <div class="tbl-card"><div class="tbl-scroll"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
    <div class="tfoot"><span class="tft" id="wcount"></span><span class="tft">Editable targets: type &amp; <kbd>Enter</kbd> or Save &nbsp;&#183;&nbsp; <span style="color:var(--purple-t);font-style:italic">italic</span> = prev week</span></div>
  </div>
</div>

<div class="tab-panel" id="tab-yearly">
  <div class="y-bar">
    <div class="y-left">
      <div>
        <div class="swrap" style="margin-bottom:6px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="sinput" id="ysearch" style="width:210px" type="text" placeholder="Search show name or ID..." oninput="renderYearly()"></div>
        <div style="font-size:10px;color:var(--t3)" id="yhint">Click a month to filter &#183; Click 2 to compare</div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Month</div>
        <div class="y-mp" id="ypills"></div>
      </div>

    </div>
    <button class="btn-sm" onclick="exportYCSV()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export CSV</button>
  </div>
  <div id="ycbar" style="display:none" class="ycbar"><span id="yclbl"></span><button onclick="clearCmp()" style="padding:2px 8px;border-radius:4px;border:1px solid var(--purple-b);background:transparent;color:var(--purple-t);cursor:pointer;font-size:11px;margin-left:auto">Clear</button></div>
  <div class="ystats" id="ystats"></div>
  <div class="ytcard"><div class="tbl-scroll"><table class="ytbl"><thead id="ythead"></thead><tbody id="ytbody"></tbody></table></div>
    <div class="tfoot"><span class="tft" id="ycount"></span></div>
  </div>
</div>
</main>
<div id="toast"></div>

<script>
// ── Auth guard ─────────────────────────────────────────────
(function(){if(!sessionStorage.getItem('ugc_auth_v1'))window.location.replace('login.html');})();

/* ===== DATA (21 fields per row) =====
   0:prod_id  1:wk  2:show  3:status  4:writer  5:pod  6:producer
   7:i_scripts  8:j_dur  9:k_ttd_sc  10:l_ttd_er  11:m_ttd_rel
   12:jt(script tgt)  13:sub  14:wc
   15:nt(ER tgt)  16:er  17:pend
   18:qt(prod tgt)  19:live

function applyZoom(v){document.body.style.zoom=parseFloat(v);try{localStorage.setItem('ugc_zoom',v);}catch(e){}}
let tT;function toast(m){const e=document.getElementById('toast');e.textContent=m;e.className='show';clearTimeout(tT);tT=setTimeout(()=>e.className='',2500);}

function uWks(){return[...new Set(rows.map(r=>r._d[F.wk]).filter(Boolean))];}
function sortWks(){return uWks().sort((a,b)=>{const ra=rows.find(r=>r._d[F.wk]===a),rb=rows.find(r=>r._d[F.wk]===b);return((ra&&ra._d[F.wkdate])||'').localeCompare((rb&&rb._d[F.wkdate])||'');});}
function prevWk(){const w=sortWks(),i=w.indexOf(fWk);return i>0?w[i-1]:null;}
function filtered(){
  const q=(document.getElementById('wsearch')||{value:''}).value.toLowerCase();
  const st=(document.getElementById('fstatus')||{value:''}).value;
  const wr=(document.getElementById('fwriter')||{value:''}).value;
  const pod=(document.getElementById('fpod')||{value:''}).value;
  return rows.filter(r=>{
    if(r._d[F.wk]!==fWk)return false;
    if(q&&!r._d[F.show].toLowerCase().includes(q))return false;
    if(st&&r._d[F.status]!==st)return false;
    if(wr&&r._d[F.writer]!==wr)return false;
    if(pod&&r._d[F.pod]!==pod)return false;
    return true;
  });
}
function pRow(show){const pw=prevWk();if(!pw)return null;return rows.find(r=>r._d[F.wk]===pw&&r._d[F.show]===show)||null;}
function gT(row,f){const k=row._key+f;return dirty[k]!==undefined?dirty[k]:row[f];}

function toggleGrp(g){GRP[g]=!GRP[g];document.getElementById('grp-'+g).classList.toggle('on',GRP[g]);rHead();rBody();}

function popDDs(){
  const wr=rows.filter(r=>r._d[F.wk]===fWk);
  const ws=document.getElementById('fwriter'),ps=document.getElementById('fpod');
  const cw=ws.value,cp=ps.value;
  const writers=[...new Set(wr.map(r=>r._d[F.writer]).filter(Boolean))].sort();
  const pods=[...new Set(wr.map(r=>r._d[F.pod]).filter(Boolean))].sort();
  ps.innerHTML='<option value="">All POD leads</option>'+pods.map(p=>`<option value="${esc(p)}"${cp===p?' selected':''}>${esc(p)}</option>`).join('');
  ws.innerHTML='<option value="">All writers</option>'+writers.map(w=>`<option value="${esc(w)}"${cw===w?' selected':''}>${esc(w)}</option>`).join('');
}

function rFilters(){
  const wks=sortWks();
  const el=document.getElementById('wpills');
  el.innerHTML=wks.map(w=>`<button class="pill${fWk===w?' active':''}" data-w="${esc(w)}">${esc(w)}</button>`).join('');
  el.querySelectorAll('.pill').forEach(b=>b.addEventListener('click',()=>setWk(b.dataset.w)));
  document.getElementById('wtag').textContent=fWk||'';
  const hp=prevWk()!==null;
  const tog=document.getElementById('prev-tog');
  tog.style.opacity=hp?'1':'0.4';tog.style.pointerEvents=hp?'auto':'none';
}

function rStats(){
  const list=filtered();
  const run=list.filter(r=>r._d[F.status]==='Running').length;
  const pau=list.filter(r=>r._d[F.status]==='Paused').length;
  const sub=list.reduce((s,r)=>s+(nv(r._d[F.sub])||0),0);
  const er=list.reduce((s,r)=>s+(nv(r._d[F.er])||0),0);
  const lv=list.reduce((s,r)=>s+(nv(r._d[F.live])||0),0);
  const isc=list.reduce((s,r)=>s+(nv(r._d[F.i_sc])||0),0);
  const items=[
    {l:'Shows',v:list.length,i:iG,c:''},
    {l:'Running',v:run,i:iPl,c:'c-green'},
    {l:'Paused',v:pau,i:iPa,c:'c-amber'},
    {l:'Scripts submitted',v:sub.toLocaleString('en-IN'),i:iF,c:'c-blue'},
    {l:'ER approved',v:er,i:iCk,c:'c-green'},
    {l:'Live episodes',v:lv,i:iBc,c:''},
    {l:'Scripts to record',v:isc.toLocaleString('en-IN'),i:iG,c:''},
  ];
  document.getElementById('wstats').innerHTML=items.map(it=>`<div class="sc"><div class="si">${it.i}</div><div class="sl">${it.l}</div><div class="sv ${it.c}">${it.v}</div></div>`).join('');
}

  const sc=pw?5:4,ec=pw?4:3,pc=pw?4:3;

  if(GRP.er)sec+=`<th colspan="${ec}" class="th-er">ER Review</th>`;

  if(GRP.pr){if(pw)col+=`<th class="ch-pp" style="width:80px">&#9664; Prev rel ${pl}</th>`;col+=`<th class="ch-pr" style="width:82px">Release target <span class="ei">&#9998;</span></th><th class="ch-prc" style="width:64px">Live eps</th><th class="ch-prc" style="width:64px">Pending</th>`;}
  col+='</tr>';

function rBody(){
  const list=filtered();
  document.getElementById('wcount').textContent='Showing '+list.length+' shows';
  document.getElementById('tbody').innerHTML=list.map((row,i)=>{
    const d=row._d,st=d[F.status];
    const badge=st==='Running'?'<span class="badge b-run"><span class="dot"></span>Running</span>':st==='Paused'?'<span class="badge b-pau"><span class="dot"></span>Paused</span>':'<span class="mu">&#8212;</span>';
    const jt=gT(row,'jt'),nt=gT(row,'nt'),qt=gT(row,'qt');
    const jD=dirty[row._key+'j']!==undefined,nD=dirty[row._key+'n']!==undefined,qD=dirty[row._key+'q']!==undefined;
    const pr=showPrev?pRow(d[F.show]):null;
    const lv=nv(d[F.live]),qtN=nv(qt);
    const lp=(lv!==null&&qtN!==null&&qtN!==0)?lv-qtN:null;
    const lpH=lp!==null?`<span class="mn" style="color:${lp<0?'var(--red-t)':'var(--green)'}">${lp>0?'+':''}${lp}</span>`:'<span class="mu">&#8212;</span>';
    const bg=i%2===0?'':' style="background:var(--sf2)"';
    let c=`<tr${bg}><td class="left"><span class="sn" title="${esc(d[F.show])}">${esc(d[F.show])}</span></td><td>${badge}</td><td class="mu">${esc(d[F.pod])||'&#8212;'}</td><td class="mu">${esc(d[F.writer])||'&#8212;'}</td><td class="mu">${esc(d[F.producer])||'&#8212;'}</td>`;
    if(GRP.ij){c+=`<td class="td-ij mn">${fN(d[F.i_sc])}</td><td class="td-ijc mn">${fN(d[F.j_dur])}</td>`;}
    if(GRP.km){c+=`<td class="td-km mn">${fN(d[F.k_ttd_sc])}</td><td class="td-kmc mn">${fN(d[F.l_ttd_er])}</td><td class="td-kmc mn">${fN(d[F.m_ttd_rel])}</td>`;}
    if(GRP.sc){
      if(showPrev)c+=`<td class="td-ps"><span class="pv">${pr&&pr.jt?pr.jt:'&#8212;'}</span></td>`;
      c+=`<td class="td-sc"><div class="ec"><input class="ei2${jD?' dirty':''}" value="${esc(jt)}" data-k="${row._key}" data-f="j" oninput="mDirty(this)" onkeydown="kChk(event,this)">${jD?`<button class="sb" onclick="comT('${row._key}','j')">Save</button>`:''}</div></td>`;
      c+=`<td class="td-scc mnb">${fmt(d[F.sub])}</td><td class="td-scc mn">${fWC(d[F.wc])}</td><td class="td-scc mn" style="color:${nv(d[F.sc_pend])!==null&&nv(d[F.sc_pend])<0?'var(--red-t)':nv(d[F.sc_pend])>0?'var(--green)':'inherit'}">${fmt(d[F.sc_pend])}</td>`;
    }
    if(GRP.er){
      if(showPrev)c+=`<td class="td-pe"><span class="pv">${pr&&pr.nt?pr.nt:'&#8212;'}</span></td>`;
      c+=`<td class="td-er"><div class="ec"><input class="ei2${nD?' dirty':''}" value="${esc(nt)}" data-k="${row._key}" data-f="n" oninput="mDirty(this)" onkeydown="kChk(event,this)">${nD?`<button class="sb" onclick="comT('${row._key}','n')">Save</button>`:''}</div></td>`;
      c+=`<td class="td-erc mnb">${fmt(d[F.er])}</td><td class="td-erc mn" style="color:${nv(d[F.pend])!==null&&nv(d[F.pend])<0?'var(--red-t)':'inherit'}">${fmt(d[F.pend])}</td>`;
    }
    if(GRP.pr){
      if(showPrev)c+=`<td class="td-pp"><span class="pv">${pr&&pr.qt?pr.qt:'&#8212;'}</span></td>`;
      c+=`<td class="td-pr"><div class="ec"><input class="ei2${qD?' dirty':''}" value="${esc(qt)}" data-k="${row._key}" data-f="q" oninput="mDirty(this)" onkeydown="kChk(event,this)">${qD?`<button class="sb" onclick="comT('${row._key}','q')">Save</button>`:''}</div></td>`;
      c+=`<td class="td-prc mnb">${fmt(d[F.live])}</td><td class="td-prc">${lpH}</td>`;
    }
    return c+'</tr>';
  }).join('');
}

function rWeekly(){rFilters();popDDs();rStats();rHead();rBody();}
function setWk(w){fWk=w;rWeekly();}
function togglePrev(){showPrev=!showPrev;document.getElementById('prev-tog').classList.toggle('on',showPrev);rHead();rBody();}
function mDirty(el){const k=el.dataset.k,f=el.dataset.f;dirty[k+f]=el.value;el.classList.add('dirty');let b=el.nextElementSibling;if(!b||b.tagName!=='BUTTON'){b=document.createElement('button');b.className='sb';b.textContent='Save';b.setAttribute('onclick',`comT('${k}','${f}')`);el.parentNode.appendChild(b);}}
function kChk(e,el){if(e.key==='Enter')comT(el.dataset.k,el.dataset.f);}
function comT(k,f){const key=k+f,val=dirty[key];if(val===undefined)return;const row=rows.find(r=>r._key===k);if(row){const fmap={j:'jt',n:'nt',q:'qt'};row[fmap[f]]=val;delete dirty[key];}saveT();rHead();rBody();toast('Target saved');}
function exportCSV(){
  const list=filtered();
  const h=['Production Show ID','Week','Show Name','Status','Writer','POD Lead','Producer','Scripts to Record (I)','Duration Live hrs (J)','TTD Scripts (K)','TTD ER (L)','TTD Release (M)','Script Target','Scripts Submitted','Word Count','ER Target','ER Approved','Approval Pending','Release Target','Live Episodes'];
  dlCSV([h,...list.map(row=>{const d=row._d;return[d[F.prod_id],d[F.wk],d[F.show],d[F.status],d[F.writer],d[F.pod],d[F.producer],d[F.i_sc],d[F.j_dur],d[F.k_ttd_sc],d[F.l_ttd_er],d[F.m_ttd_rel],gT(row,'jt'),d[F.sub],d[F.wc],gT(row,'nt'),d[F.er],d[F.pend],gT(row,'qt'),d[F.live]];})],'weekly_'+(fWk||'export').replace(/[^a-z0-9]/gi,'_')+'_'+today()+'.csv');
}

/* YEARLY */
function yMonths(){return[...new Set(YDATA.map(r=>r[YF.month]))].sort((a,b)=>{const sa=YDATA.find(r=>r[YF.month]===a)?.[YF.msort]||'',sb=YDATA.find(r=>r[YF.month]===b)?.[YF.msort]||'';return sa.localeCompare(sb);});}
function yFilt(){
  const q=(document.getElementById('ysearch')||{value:''}).value.toLowerCase().trim();
  let months=null;
  if(yCmp.length>=1)months=yCmp;
  else if(yFM!=='all')months=[yFM];
  let list=YDATA.filter(r=>{
    if(months&&!months.includes(r[YF.month]))return false;
    if(q&&!r[YF.show].toLowerCase().includes(q)&&!r[YF.id].toLowerCase().includes(q))return false;
    if(yMinAct==='sub'&&!(r[YF.sub]>0))return false;
    if(yMinAct==='er'&&!(r[YF.er]>0))return false;
    if(yMinAct==='live'&&!(r[YF.live]>0))return false;
    return true;
  });
  if(ySort==='sub')list.sort((a,b)=>b[YF.sub]-a[YF.sub]);
  else if(ySort==='er')list.sort((a,b)=>b[YF.er]-a[YF.er]);
  else if(ySort==='live')list.sort((a,b)=>b[YF.live]-a[YF.live]);
  else if(ySort==='wc')list.sort((a,b)=>b[YF.wc]-a[YF.wc]);
  else if(ySort==='dur')list.sort((a,b)=>b[YF.dur]-a[YF.dur]);
  else list.sort((a,b)=>a[YF.show].localeCompare(b[YF.show]));
  return list;
}
function clearCmp(){yCmp=[];yFM='all';renderYearly();}
function rYPills(){
  const months=yMonths();
  const el=document.getElementById('ypills');
  // Group by year
  const byYear={};
  months.forEach(m=>{
    const parts=m.split(' ');
    const yr=parts[parts.length-1];
    if(!byYear[yr])byYear[yr]=[];
    byYear[yr].push(m);
  });
  const years=Object.keys(byYear).sort();
  let html='';
  years.forEach(yr=>{
    html+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.6px;margin-bottom:4px;text-transform:uppercase">${yr}</div><div style="display:flex;gap:4px;flex-wrap:wrap">`;
    byYear[yr].forEach(m=>{
      const mon=m.split(' ')[0];
      let c='yp';
      if(yCmp[0]===m)c+=' cmpa';
      else if(yCmp[1]===m)c+=' cmpb';
      else if(yCmp.length===0&&yFM===m)c+=' single';
      html+=`<button class="${c}" data-m="${esc(m)}">${esc(mon)}</button>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
  el.querySelectorAll('.yp').forEach(b=>b.addEventListener('click',()=>{
    const m=b.dataset.m;
    if(yCmp.includes(m)){yCmp=yCmp.filter(x=>x!==m);if(yCmp.length===0)yFM='all';}
    else if(yCmp.length===2){yCmp=[yCmp[1],m];}
    else if(yCmp.length===1){yCmp=[...yCmp,m];}
    else if(yFM===m){yFM='all';}
    else if(yFM!=='all'){yCmp=[yFM,m];yFM='all';}
    else{yFM=m;}
    renderYearly();
  }));
  const isC=yCmp.length===2;
  document.getElementById('ycbar').style.display=isC?'flex':'none';
  if(isC)document.getElementById('yclbl').textContent='Comparing '+yCmp[0]+' vs '+yCmp[1];
  const h=document.getElementById('yhint');
  if(h){if(isC)h.textContent='Compare mode - click coloured pill to deselect';else if(yFM!=='all')h.textContent='Single month - click another to compare';else h.textContent='Click a month to filter - Click 2 to compare';}
}
function rYStats(){const list=yFilt();const items=[{l:'Scripts submitted',v:Math.round(list.reduce((s,r)=>s+r[YF.sub],0)).toLocaleString('en-IN'),i:iF,c:'c-blue'},{l:'Editorial reviewed',v:Math.round(list.reduce((s,r)=>s+r[YF.er],0)).toLocaleString('en-IN'),i:iCk,c:'c-green'},{l:'Eps made live',v:Math.round(list.reduce((s,r)=>s+r[YF.live],0)).toLocaleString('en-IN'),i:iBc,c:'c-amber'},{l:'Scripts WC',v:Math.round(list.reduce((s,r)=>s+r[YF.wc],0)).toLocaleString('en-IN'),i:iG,c:''},{l:'Live duration (hr)',v:list.reduce((s,r)=>s+r[YF.dur],0).toFixed(1),i:iPl,c:''}];document.getElementById('ystats').innerHTML=items.map(it=>`<div class="sc"><div class="si">${it.i}</div><div class="sl">${it.l}</div><div class="sv ${it.c}">${it.v}</div></div>`).join('');}

  }
  h+='</tr>';
  document.getElementById('ythead').innerHTML=h;

function setYSort(k){ySort=(ySort===k?'':k);renderYearly();}
function rYBody(){

];
const YCOL_BGS=[

];
YKEYS.forEach((k,ki)=>{

});html+=c+'</tr>';});document.getElementById('ycount').textContent='Showing '+cnt+' shows';}
  else{document.getElementById('ycount').textContent='Showing '+list.length+' rows';html=list.map((r,i)=>{const bg=i%2===0?'':' style="background:var(--sf2)"';return`<tr${bg}>

// Targets come from WDATA (Excel columns N, R, U).
// Upload new Excel → targets update automatically.
// User can edit cells in the dashboard — edits saved to localStorage.
// localStorage edits persist across refreshes but Excel upload always
// refreshes the WDATA, so to update targets just edit Excel & upload.
// To clear all overrides: localStorage.removeItem(STORE)
function loadT(){
  try{
    const s=JSON.parse(localStorage.getItem(STORE)||'{}');
    rows.forEach(r=>{
      // Start from Excel value (already set in rows init from WDATA)
      // Apply any dashboard edits on top
      if(s[r._key+'j']!==undefined) r.jt=s[r._key+'j'];
      if(s[r._key+'n']!==undefined) r.nt=s[r._key+'n'];
      if(s[r._key+'q']!==undefined) r.qt=s[r._key+'q'];
    });
  }catch(e){}
}
function saveT(){
  const s={};
  rows.forEach(r=>{
    // Only save if value differs from Excel default
    if(r.jt!==r._d[F.jt]) s[r._key+'j']=r.jt;
    if(r.nt!==r._d[F.nt]) s[r._key+'n']=r.nt;
    if(r.qt!==r._d[F.qt]) s[r._key+'q']=r.qt;
  });
  localStorage.setItem(STORE,JSON.stringify(s));
}

function fWC(v){const x=parseInt(v);return(!x||x===0)?'<span class="mu">&#8212;</span>':x.toLocaleString('en-IN');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function filtered(){
  const q=(document.getElementById('wsearch')||{value:''}).value.toLowerCase();

function mDirty(el){const k=el.dataset.k,f=el.dataset.f;dirty[k+f]=el.value;el.classList.add('dirty');let b=el.nextElementSibling;if(!b||b.tagName!=='BUTTON'){b=document.createElement('button');b.className='sb';b.textContent='Save';b.setAttribute('onclick',`comT('${k}','${f}')`);el.parentNode.appendChild(b);}}

/* YEARLY */
function yMonths(){return[...new Set(YDATA.map(r=>r[YF.month]))].sort((a,b)=>{const sa=YDATA.find(r=>r[YF.month]===a)?.[YF.msort]||'',sb=YDATA.find(r=>r[YF.month]===b)?.[YF.msort]||'';return sa.localeCompare(sb);});}
function yFilt(){
  const q=(document.getElementById('ysearch')||{value:''}).value.toLowerCase().trim();
  let months=null;
  if(yCmp.length>=1)months=yCmp;
  else if(yFM!=='all')months=[yFM];
  let list=YDATA.filter(r=>{
    if(months&&!months.includes(r[YF.month]))return false;
    if(q&&!r[YF.show].toLowerCase().includes(q)&&!r[YF.id].toLowerCase().includes(q))return false;
    if(yMinAct==='sub'&&!(r[YF.sub]>0))return false;
    if(yMinAct==='er'&&!(r[YF.er]>0))return false;
    if(yMinAct==='live'&&!(r[YF.live]>0))return false;
    return true;
  });
  if(ySort==='sub')list.sort((a,b)=>b[YF.sub]-a[YF.sub]);
  else if(ySort==='er')list.sort((a,b)=>b[YF.er]-a[YF.er]);
  else if(ySort==='live')list.sort((a,b)=>b[YF.live]-a[YF.live]);
  else if(ySort==='wc')list.sort((a,b)=>b[YF.wc]-a[YF.wc]);
  else if(ySort==='dur')list.sort((a,b)=>b[YF.dur]-a[YF.dur]);
  else list.sort((a,b)=>a[YF.show].localeCompare(b[YF.show]));
  return list;
}
function clearCmp(){yCmp=[];yFM='all';renderYearly();}
function rYPills(){
  const months=yMonths();
  const el=document.getElementById('ypills');
  // Group by year
  const byYear={};
  months.forEach(m=>{
    const parts=m.split(' ');
    const yr=parts[parts.length-1];
    if(!byYear[yr])byYear[yr]=[];
    byYear[yr].push(m);
  });
  const years=Object.keys(byYear).sort();
  let html='';
  years.forEach(yr=>{
    html+=`<div style="margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.6px;margin-bottom:4px;text-transform:uppercase">${yr}</div><div style="display:flex;gap:4px;flex-wrap:wrap">`;
    byYear[yr].forEach(m=>{
      const mon=m.split(' ')[0];
      let c='yp';
      if(yCmp[0]===m)c+=' cmpa';
      else if(yCmp[1]===m)c+=' cmpb';
      else if(yCmp.length===0&&yFM===m)c+=' single';
      html+=`<button class="${c}" data-m="${esc(m)}">${esc(mon)}</button>`;
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
  el.querySelectorAll('.yp').forEach(b=>b.addEventListener('click',()=>{
    const m=b.dataset.m;
    if(yCmp.includes(m)){yCmp=yCmp.filter(x=>x!==m);if(yCmp.length===0)yFM='all';}
    else if(yCmp.length===2){yCmp=[yCmp[1],m];}
    else if(yCmp.length===1){yCmp=[...yCmp,m];}
    else if(yFM===m){yFM='all';}
    else if(yFM!=='all'){yCmp=[yFM,m];yFM='all';}
    else{yFM=m;}
    renderYearly();
  }));
  const isC=yCmp.length===2;
  document.getElementById('ycbar').style.display=isC?'flex':'none';
  if(isC)document.getElementById('yclbl').textContent='Comparing '+yCmp[0]+' vs '+yCmp[1];
  const h=document.getElementById('yhint');
  if(h){if(isC)h.textContent='Compare mode - click coloured pill to deselect';else if(yFM!=='all')h.textContent='Single month - click another to compare';else h.textContent='Click a month to filter - Click 2 to compare';}
}
function rYStats(){const list=yFilt();const items=[{l:'Scripts submitted',v:Math.round(list.reduce((s,r)=>s+r[YF.sub],0)).toLocaleString('en-IN'),i:iF,c:'c-blue'},{l:'Editorial reviewed',v:Math.round(list.reduce((s,r)=>s+r[YF.er],0)).toLocaleString('en-IN'),i:iCk,c:'c-green'},{l:'Eps made live',v:Math.round(list.reduce((s,r)=>s+r[YF.live],0)).toLocaleString('en-IN'),i:iBc,c:'c-amber'},{l:'Scripts WC',v:Math.round(list.reduce((s,r)=>s+r[YF.wc],0)).toLocaleString('en-IN'),i:iG,c:''},{l:'Live duration (hr)',v:list.reduce((s,r)=>s+r[YF.dur],0).toFixed(1),i:iPl,c:''}];document.getElementById('ystats').innerHTML=items.map(it=>`<div class="sc"><div class="si">${it.i}</div><div class="sl">${it.l}</div><div class="sv ${it.c}">${it.v}</div></div>`).join('');}
const YCOLS=['Scripts Submitted','Editorial Reviewed','Eps Made Live','Scripts WC','Live Duration (hr)'];
const YKEYS=[YF.sub,YF.er,YF.live,YF.wc,YF.dur];
const YCLS=['yh-sc','yh-er','yh-lv','yh-wc','yh-dr'];
function rYHead(){
  const isC=yCmp.length===2;const[mA,mB]=yCmp;
  const sortKeys=['sub','er','live','wc','dur'];
  const sortArrow=(k)=>{
    if(ySort!==k)return`<span style="opacity:.25;margin-left:5px;font-size:13px;vertical-align:middle">&#8597;</span>`;
    // currently always descending when active
    return`<span style="margin-left:5px;font-size:14px;font-weight:700;color:#166534;vertical-align:middle">&#8595;</span>`;
  };
  let h='<tr><th class="left" style="width:110px">Show ID</th><th class="left" style="width:195px">Show title</th>';
  if(isC){
    YCOLS.forEach((col,i)=>{
      const k=sortKeys[i];
      h+=`<th class="${YCLS[i]}" style="min-width:95px;cursor:pointer;user-select:none" onclick="setYSort('${k}')">${col}${sortArrow(k)}<br><span style="font-size:9px;opacity:.75">${esc(mA)}</span></th>`;
      h+=`<th class="${YCLS[i]}" style="min-width:95px;border-left:1px dashed var(--bds);cursor:pointer;user-select:none" onclick="setYSort('${k}')">${col}${sortArrow(k)}<br><span style="font-size:9px;opacity:.75">${esc(mB)}</span></th>`;
      h+=`<th style="min-width:65px;background:#fafaf8;font-size:9px">Diff</th>`;
    });
  } else {
    YCOLS.forEach((col,i)=>{
      const k=sortKeys[i];
      h+=`<th class="${YCLS[i]}" style="min-width:110px;cursor:pointer;user-select:none" onclick="setYSort('${k}')">${col}${sortArrow(k)}</th>`;
    });
  }
  h+='</tr>';
  document.getElementById('ythead').innerHTML=h;
}
function setYSort(k){ySort=(ySort===k?'':k);renderYearly();}
function rYBody(){
  const isC=yCmp.length===2;const[mA,mB]=yCmp;const list=yFilt();const q=(document.getElementById('ysearch')||{value:''}).value.toLowerCase().trim();let html='';
  if(isC){const shows=[...new Set(YDATA.map(r=>r[YF.id]))];let cnt=0;shows.forEach(sid=>{const rA=YDATA.find(r=>r[YF.id]===sid&&r[YF.month]===mA),rB=YDATA.find(r=>r[YF.id]===sid&&r[YF.month]===mB);if(!rA&&!rB)return;const sn=(rA||rB)[YF.show];if(q&&!sn.toLowerCase().includes(q)&&!sid.toLowerCase().includes(q))return;cnt++;const bg=cnt%2===0?' style="background:var(--sf2)"':'';let c=`<tr${bg}><td class="left"><span class="yt-id" title="${esc(sid)}">${esc(sid.slice(0,12))}...</span></td><td class="left"><span class="yt-ttl" title="${esc(sn)}">${esc(sn)}</span></td>`;const YCOL_COLORS=[
  'var(--blue-t)','var(--green-t)','var(--amber-t)','var(--purple-t)','var(--teal-t)'
];
const YCOL_BGS=[
  '#f7f9ff','#f5fdf9','#fdfcf5','#f8f6ff','#f0fdff'
];
YKEYS.forEach((k,ki)=>{
  const vA=rA?rA[k]:0,vB=rB?rB[k]:0,d=vB-vA,isDur=k===YF.dur;
  const clr=YCOL_COLORS[ki];
  const bg=YCOL_BGS[ki];
  const fv=v=>v>0?`<span style="color:${clr};font-family:'DM Mono',monospace;font-weight:600">${isDur?v.toFixed(2):Math.round(v).toLocaleString('en-IN')}</span>`:'<span class="mu">&#8212;</span>';
  const fd=d=>d===0?'<span class="mu">0</span>':`<span style="color:${d>0?'#166534':'var(--red-t)'};font-family:'DM Mono',monospace;font-size:10px;font-weight:600">${d>0?'+':''}${isDur?d.toFixed(2):Math.round(d).toLocaleString('en-IN')}</span>`;
  c+=`<td class="yn" style="background:${bg}">${fv(vA)}</td><td class="yn" style="background:${bg};border-left:1px dashed var(--bds)">${fv(vB)}</td><td style="background:#fafaf8;text-align:center">${fd(d)}</td>`;
});html+=c+'</tr>';});document.getElementById('ycount').textContent='Showing '+cnt+' shows';}
  else{document.getElementById('ycount').textContent='Showing '+list.length+' rows';html=list.map((r,i)=>{const bg=i%2===0?'':' style="background:var(--sf2)"';return`<tr${bg}>
  <td class="left"><span class="yt-id" title="${esc(r[YF.id])}">${esc(r[YF.id].slice(0,12))}...</span></td>
  <td class="left"><span class="yt-ttl" title="${esc(r[YF.show])}">${esc(r[YF.show])}</span></td>
  <td class="yn" style="color:var(--blue-t);font-weight:600;background:#f7f9ff">${r[YF.sub]>0?Math.round(r[YF.sub]).toLocaleString('en-IN'):'<span class="mu">&#8212;</span>'}</td>
  <td class="yn" style="color:var(--green-t);font-weight:600;background:#f5fdf9">${r[YF.er]>0?Math.round(r[YF.er]).toLocaleString('en-IN'):'<span class="mu">&#8212;</span>'}</td>
  <td class="yn" style="color:var(--amber-t);font-weight:600;background:#fdfcf5">${r[YF.live]>0?Math.round(r[YF.live]).toLocaleString('en-IN'):'<span class="mu">&#8212;</span>'}</td>
  <td class="yn" style="color:var(--purple-t);font-weight:600;background:#f8f6ff">${r[YF.wc]>0?Math.round(r[YF.wc]).toLocaleString('en-IN'):'<span class="mu">&#8212;</span>'}</td>
  <td class="yn" style="color:var(--teal-t);font-weight:600;background:#f0fdff">${r[YF.dur]>0?r[YF.dur].toFixed(2):'<span class="mu">&#8212;</span>'}</td>
</tr>`;}).join('');}
  document.getElementById('ytbody').innerHTML=html;
}
function renderYearly(){rYPills();rYStats();rYHead();rYBody();}
function exportYCSV(){const isC=yCmp.length===2;const[mA,mB]=yCmp;let h,data;if(isC){h=['Show ID','Show Title',...YCOLS.flatMap(c=>[c+' ('+mA+')',c+' ('+mB+')',c+' Diff'])];const shows=[...new Set(YDATA.map(r=>r[YF.id]))];const q=(document.getElementById('ysearch')||{value:''}).value.toLowerCase().trim();data=[];shows.forEach(sid=>{const rA=YDATA.find(r=>r[YF.id]===sid&&r[YF.month]===mA),rB=YDATA.find(r=>r[YF.id]===sid&&r[YF.month]===mB);if(!rA&&!rB)return;const sn=(rA||rB)[YF.show];if(q&&!sn.toLowerCase().includes(q)&&!sid.toLowerCase().includes(q))return;data.push([sid,sn,...YKEYS.flatMap(k=>{const vA=rA?rA[k]:0,vB=rB?rB[k]:0;return[vA,vB,vB-vA];})]);});}else{h=['Show ID','Show Title','Month','Scripts Submitted','Editorial Reviewed','Eps Made Live','Scripts WC','Live Duration (hr)'];data=yFilt().map(r=>[r[YF.id],r[YF.show],r[YF.month],r[YF.sub],r[YF.er],r[YF.live],r[YF.wc],r[YF.dur]]);}dlCSV([h,...data],'yearly_'+today()+'.csv');}

function dlCSV(rows,fn){const csv=rows.map(r=>r.map(v=>{const s=String(v==null?'':v);return(s.includes(',')||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();toast('CSV downloaded');}

const iG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>';
const iPl='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
const iPa='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
const iF='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>';
const iCk='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
const iBc='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/></svg>';

document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active');}));

loadT();
const initW=sortWks();
fWk=initW[initW.length-1]||null;
rWeekly();
renderYearly();
try{const z=localStorage.getItem('ugc_zoom');if(z){document.body.style.zoom=parseFloat(z);}}catch(e){}
</script>
