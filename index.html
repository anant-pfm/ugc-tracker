<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>UGC Production Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2f1ed;--sf:#fff;--sf2:#f7f6f3;--bd:#e5e3db;--bds:#ccc9be;
  --tx:#18170f;--t2:#57554c;--t3:#9b9890;
  --blue:#1a56db;--blue-l:#eff4ff;--blue-b:#b4c8fd;--blue-t:#1e3a8a;
  --green:#047857;--green-l:#ecfdf5;--green-b:#6ee7b7;--green-t:#064e3b;
  --amber:#b45309;--amber-l:#fffbeb;--amber-b:#fcd34d;--amber-t:#78350f;
  --red:#dc2626;--red-t:#991b1b;
  --purple:#6d28d9;--purple-l:#f5f3ff;--purple-b:#c4b5fd;--purple-t:#4c1d95;
  --slate:#475569;--slate-l:#f1f5f9;--slate-b:#cbd5e1;--slate-t:#1e293b;
  --teal:#0e7490;--teal-l:#ecfeff;--teal-t:#164e63;
  --indigo:#4338ca;--indigo-l:#eef2ff;--indigo-b:#a5b4fc;--indigo-t:#312e81;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}

/* TOPBAR */
.topbar{background:var(--tx);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300}
.tb-l{display:flex;align-items:center;gap:8px}
.tb-logo{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
.tb-logo svg{width:13px;height:13px}
.tb-title{font-size:13px;font-weight:600;color:#fff}
.tb-tag{font-size:10px;color:rgba(255,255,255,.4);padding:2px 7px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}
.tb-r{display:flex;align-items:center;gap:8px}
.zoom-sel{padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.75);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;outline:none}

/* TABS */
.tab-nav{background:var(--tx);padding:0 20px;display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.1)}
.tab-btn{padding:9px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,.45);background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;border-bottom:2px solid transparent;transition:color .12s,border-color .12s}
.tab-btn.active{color:#fff;border-bottom-color:#fff}

/* MAIN */
.main{padding:18px 20px 60px;max-width:100%;margin:0 auto}
.tab-panel{display:none}.tab-panel.active{display:block}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.tbl-l{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tbl-r{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--bds);background:var(--sf);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.pill:hover{border-color:var(--blue);color:var(--blue)}
.pill.active{background:var(--tx);border-color:var(--tx);color:#fff}
.toggle-wrap{display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:8px;border:1px solid var(--bds);background:var(--sf);cursor:pointer;user-select:none;font-size:12px;font-weight:500;color:var(--t2)}
.toggle-wrap.on{background:var(--purple-l);border-color:var(--purple-b);color:var(--purple-t)}
.toggle-sw{width:26px;height:14px;border-radius:7px;background:var(--bds);position:relative;flex-shrink:0}
.toggle-sw::after{content:'';position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle-wrap.on .toggle-sw{background:var(--purple)}
.toggle-wrap.on .toggle-sw::after{transform:translateX(12px)}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-sm svg{width:13px;height:13px}

/* FILTER ROW */
.filter-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--t3);pointer-events:none}
.search-input{padding:5px 10px 5px 28px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--tx);outline:none;width:190px}
.sel-filter{padding:5px 9px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--t2);outline:none;cursor:pointer}

/* COLUMN GROUP TOGGLES */
.grp-toggles{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:12px;padding:8px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:10px}
.grp-lbl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.grp-btn{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--bds);background:var(--sf2);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;display:flex;align-items:center;gap:4px}
.grp-btn.on{color:var(--sf)}
.grp-btn.on.g-ij{background:var(--slate);border-color:var(--slate)}
.grp-btn.on.g-km{background:var(--indigo);border-color:var(--indigo)}
.grp-btn.on.g-sc{background:var(--blue);border-color:var(--blue)}
.grp-btn.on.g-er{background:var(--green);border-color:var(--green)}
.grp-btn.on.g-pr{background:var(--amber);border-color:var(--amber)}
.grp-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.stat-card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.stat-icon{width:24px;height:24px;border-radius:6px;background:var(--sf2);display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.stat-icon svg{width:12px;height:12px;color:var(--t2)}
.stat-label{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.stat-value{font-size:22px;font-weight:600;letter-spacing:-.5px;line-height:1.1}
.sv-blue{color:var(--blue)}.sv-green{color:var(--green)}.sv-amber{color:var(--amber)}

/* TABLE */
.table-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px}
thead tr.sec-row th{padding:6px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd);text-align:center}
.th-base{background:var(--sf2);color:var(--t3);text-align:left}
.th-ij{background:var(--slate-l);color:var(--slate-t);border-left:3px solid var(--slate)}
.th-km{background:var(--indigo-l);color:var(--indigo-t);border-left:3px solid var(--indigo)}
.th-sc{background:var(--blue-l);color:var(--blue-t);border-left:3px solid var(--blue)}
.th-er{background:var(--green-l);color:var(--green-t);border-left:3px solid var(--green)}
.th-pr{background:var(--amber-l);color:var(--amber-t);border-left:3px solid var(--amber)}
thead tr.col-row th{padding:7px 8px;font-size:10px;font-weight:600;color:var(--t3);text-align:center;border-bottom:1px solid var(--bd);white-space:nowrap;background:var(--sf)}
thead tr.col-row th.left{text-align:left}
.ch-ij{background:#f5f7fa;border-left:3px solid var(--slate)}.ch-ijc{background:#f5f7fa}
.ch-km{background:#f0f0fb;border-left:3px solid var(--indigo)}.ch-kmc{background:#f0f0fb}
.ch-sc{background:#f7f9ff;border-left:3px solid var(--blue)}.ch-scc{background:#f7f9ff}
.ch-er{background:#f5fdf9;border-left:3px solid var(--green)}.ch-erc{background:#f5fdf9}
.ch-pr{background:#fdfcf5;border-left:3px solid var(--amber)}.ch-prc{background:#fdfcf5}
.ch-ps{background:#edf0fb;border-left:2px dashed var(--blue)}
.ch-pe{background:#eaf4ee;border-left:2px dashed var(--green)}
.ch-pp{background:#f5efe0;border-left:2px dashed var(--amber)}
.edit-icon{color:var(--blue);font-size:9px;margin-left:2px}
tbody tr{border-bottom:1px solid var(--bd)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:var(--sf2)!important}
td{padding:8px 8px;vertical-align:middle;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.left{text-align:left}
.td-ij{background:#f5f7fa;border-left:3px solid var(--slate)}.td-ijc{background:#f5f7fa}
.td-km{background:#f0f0fb;border-left:3px solid var(--indigo)}.td-kmc{background:#f0f0fb}
.td-sc{background:#f9faff;border-left:3px solid var(--blue)}.td-scc{background:#f9faff}
.td-er{background:#f7fdfa;border-left:3px solid var(--green)}.td-erc{background:#f7fdfa}
.td-pr{background:#fdfdf6;border-left:3px solid var(--amber)}.td-prc{background:#fdfdf6}
.td-ps{background:#edf0fb;border-left:2px dashed var(--blue)}
.td-pe{background:#eaf4ee;border-left:2px dashed var(--green)}
.td-pp{background:#f5efe0;border-left:2px dashed var(--amber)}
.show-name{font-weight:500;display:block;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
.badge-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.b-run{background:var(--green-l);color:var(--green-t);border:1px solid var(--green-b)}.b-run .badge-dot{background:var(--green)}
.b-pause{background:var(--amber-l);color:var(--amber-t);border:1px solid var(--amber-b)}.b-pause .badge-dot{background:var(--amber)}
.muted{color:var(--t3)}
.num{font-family:'DM Mono',monospace;font-size:11px}
.num-b{font-weight:600;font-family:'DM Mono',monospace;font-size:11px}
.prev-val{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple-t);font-style:italic}
.edit-cell{display:flex;align-items:center;justify-content:center;gap:3px}
.edit-input{width:54px;padding:2px 4px;border-radius:5px;font-size:11px;font-family:'DM Mono',monospace;border:1px solid var(--bds);background:transparent;color:var(--tx);text-align:center;outline:none}
.edit-input:focus,.edit-input.dirty{border-color:var(--blue);background:var(--blue-l)}
.save-btn{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;border:none;background:var(--blue);color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif}
.table-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid var(--bd);background:var(--sf2);flex-wrap:wrap;gap:5px}
.tf-text{font-size:10px;color:var(--t3)}
kbd{background:var(--bg);border:1px solid var(--bds);border-radius:3px;padding:1px 4px;font-family:'DM Mono',monospace;font-size:9px}

/* YEARLY */
.y-filter-bar{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.y-search-wrap{position:relative}
.y-search-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--t3);pointer-events:none}
.y-search{padding:5px 10px 5px 28px;border-radius:7px;border:1px solid var(--bds);background:var(--sf);font-size:12px;font-family:'DM Sans',sans-serif;color:var(--tx);outline:none;width:210px}
.y-month-grid{display:flex;gap:4px;flex-wrap:wrap}
.y-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--bds);background:var(--sf);color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.y-pill:hover{border-color:var(--blue);color:var(--blue)}
.y-pill.single{background:var(--tx);border-color:var(--tx);color:#fff}
.y-pill.cmp-a{background:var(--blue);border-color:var(--blue);color:#fff}
.y-pill.cmp-b{background:var(--purple);border-color:var(--purple);color:#fff}
.y-compare-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--purple-l);border:1px solid var(--purple-b);border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--purple-t);flex-wrap:wrap}
.ystats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.ytable-card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
table.ytbl{min-width:750px}
table.ytbl thead th{padding:8px 10px;font-size:10px;font-weight:600;color:var(--t3);background:var(--sf2);border-bottom:1px solid var(--bd);white-space:nowrap;text-align:center}
table.ytbl thead th.left{text-align:left}
.h-sc{background:#f0f4ff;color:var(--blue-t)}.h-er{background:#f0fdf7;color:var(--green-t)}
.h-lv{background:#fffbf0;color:var(--amber-t)}.h-wc{background:#f5f3ff;color:var(--purple-t)}
.h-dur{background:#ecfeff;color:var(--teal-t)}
table.ytbl tbody tr{border-bottom:1px solid var(--bd)}
table.ytbl tbody tr:last-child{border-bottom:none}
table.ytbl tbody tr:hover td{background:var(--sf2)!important}
table.ytbl td{padding:8px 10px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
table.ytbl td.left{text-align:left}
.yt-show{font-weight:500;max-width:200px;display:block;overflow:hidden;text-overflow:ellipsis}
.yt-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3)}
.yt-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:500}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;background:var(--tx);color:#fff;opacity:0;transition:opacity .2s;pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>

<header class="topbar">
  <div class="tb-l">
    <div class="tb-logo"><svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity=".6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity=".6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity=".3"/></svg></div>
    <span class="tb-title">UGC Production Tracker</span>
    <span class="tb-tag" id="week-tag"></span>
  </div>
  <div class="tb-r">
    <select class="zoom-sel" id="zoom-sel" onchange="applyZoom(this.value)">
      <option value="1">100%</option>
      <option value="0.9">90%</option>
      <option value="0.8">80%</option>
      <option value="0.75">75%</option>
      <option value="0.6">60%</option>
      <option value="0.5">50%</option>
    </select>
  </div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="weekly">Weekly Tracker</button>
  <button class="tab-btn" data-tab="yearly">Yearly Tracker</button>
</nav>

<main class="main">

<!-- WEEKLY -->
<div class="tab-panel active" id="tab-weekly">
  <div class="toolbar">
    <div class="tbl-l">
      <div class="filter-pills" id="filter-pills"></div>
      <div class="toggle-wrap" id="prev-toggle" onclick="togglePrev()">
        <div class="toggle-sw"></div>
        <span>Last week targets</span>
      </div>
    </div>
    <div class="tbl-r">
      <button class="btn-sm" onclick="exportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
  </div>

  <!-- Column group toggles -->
  <div class="grp-toggles">
    <span class="grp-lbl">Show columns:</span>
    <button class="grp-btn g-ij on" id="grp-ij" onclick="toggleGrp('ij')"><span class="grp-dot"></span>Scripts &amp; Duration (I–J)</button>
    <button class="grp-btn g-km on" id="grp-km" onclick="toggleGrp('km')"><span class="grp-dot"></span>TTD Monthwise (K–M)</button>
    <button class="grp-btn g-sc on" id="grp-sc" onclick="toggleGrp('sc')"><span class="grp-dot"></span>Scripting</button>
    <button class="grp-btn g-er on" id="grp-er" onclick="toggleGrp('er')"><span class="grp-dot"></span>ER Review</button>
    <button class="grp-btn g-pr on" id="grp-pr" onclick="toggleGrp('pr')"><span class="grp-dot"></span>Production</button>
  </div>

  <div class="filter-row">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="search-show" type="text" placeholder="Search show name…" oninput="renderBody()">
    </div>
    <select class="sel-filter" id="filter-status" onchange="renderBody()">
      <option value="">All statuses</option>
      <option value="Running">Running</option>
      <option value="Paused">Paused</option>
    </select>
    <select class="sel-filter" id="filter-writer" onchange="renderBody()"><option value="">All writers</option></select>
    <select class="sel-filter" id="filter-pod" onchange="renderBody()"><option value="">All POD leads</option></select>
  </div>

  <div class="stats-grid" id="stats-grid"></div>

  <div class="table-card">
    <div class="tbl-scroll">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
    <div class="table-footer">
      <span class="tf-text" id="row-count"></span>
      <span class="tf-text">✎ editable — <kbd>Enter</kbd> or Save · <span style="color:var(--purple-t);font-style:italic">italic</span> = prev week</span>
    </div>
  </div>
</div>

<!-- YEARLY -->
<div class="tab-panel" id="tab-yearly">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px">
    <div class="y-filter-bar">
      <div>
        <div class="y-search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="y-search" id="y-search" type="text" placeholder="Search show name or ID…" oninput="renderYearly()">
        </div>
        <div style="font-size:10px;color:var(--t3);margin-top:5px" id="y-hint">Click a month to filter · Click 2 to compare</div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Month</div>
        <div class="y-month-grid" id="y-pills"></div>
      </div>
    </div>
    <button class="btn-sm" onclick="exportYCSV()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export CSV
    </button>
  </div>

  <div id="y-cmp-bar" style="display:none" class="y-compare-bar">
    <span id="y-cmp-label"></span>
    <button onclick="clearYCmp()" style="padding:2px 8px;border-radius:4px;border:1px solid var(--purple-b);background:transparent;color:var(--purple-t);cursor:pointer;font-size:11px;margin-left:auto">✕ Clear</button>
  </div>

  <div class="ystats" id="ystats"></div>
  <div class="ytable-card">
    <div class="tbl-scroll">
      <table class="ytbl"><thead id="ythead"></thead><tbody id="ytbody"></tbody></table>
    </div>
    <div class="table-footer">
      <span class="tf-text" id="y-count"></span>
      <span class="tf-text" id="y-footer-hint"></span>
    </div>
  </div>
</div>

</main>
<div id="toast"></div>

function saveT(){const o={};rows.forEach(r=>{if(r.jt!=='')o[r._key+'_jt']=r.jt;if(r.nt!=='')o[r._key+'_nt']=r.nt;if(r.qt!=='')o[r._key+'_qt']=r.qt;});localStorage.setItem(STORE,JSON.stringify(o));}

/* ── UTILS ── */
function n(v){const x=parseFloat(v);return isNaN(x)?null:x;}
function fmt(v){return(v===''||v==null)?'<span class="muted">—</span>':v;}
function fmtN(v){const x=parseFloat(v);if(isNaN(x)||x===0)return'<span class="muted">—</span>';return x%1===0?Math.round(x).toLocaleString('en-IN'):x.toLocaleString('en-IN',{maximumFractionDigits:2});}
function fmtWC(v){const x=parseInt(v);return(!x||x===0)?'<span class="muted">—</span>':x.toLocaleString('en-IN');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().slice(0,10);}
let toastT;
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.className='show';clearTimeout(toastT);toastT=setTimeout(()=>e.className='',2500);}
function applyZoom(v){document.body.style.zoom=parseFloat(v);try{localStorage.setItem('ugc_zoom',v);}catch(e){}}

/* ── WEEK HELPERS ── */
function uniqueWeeks(){return[...new Set(rows.map(r=>r._d[F.wk]).filter(Boolean))];}
function sortedWeeks(){return uniqueWeeks().sort((a,b)=>{const ra=rows.find(r=>r._d[F.wk]===a),rb=rows.find(r=>r._d[F.wk]===b);return((ra?ra._d[F.wkdate]:'')||'').localeCompare((rb?rb._d[F.wkdate]:'')||'');});}
function prevWeek(){const w=sortedWeeks(),i=w.indexOf(filterWk);return i>0?w[i-1]:null;}
function filtered(){
  const q=(document.getElementById('search-show')||{value:''}).value.toLowerCase();
  const st=(document.getElementById('filter-status')||{value:''}).value;
  const wr=(document.getElementById('filter-writer')||{value:''}).value;
  const pod=(document.getElementById('filter-pod')||{value:''}).value;
  return rows.filter(r=>{
    if(r._d[F.wk]!==filterWk)return false;
    if(q&&!r._d[F.show].toLowerCase().includes(q))return false;
    if(st&&r._d[F.status]!==st)return false;
    if(wr&&r._d[F.writer]!==wr)return false;
    if(pod&&r._d[F.pod]!==pod)return false;
    return true;
  });
}
function prevRowFor(show){const pw=prevWeek();if(!pw)return null;return rows.find(r=>r._d[F.wk]===pw&&r._d[F.show]===show)||null;}
function getT(row,field){const k=`${row._key}_${field}`;return dirty[k]!==undefined?dirty[k]:row[field];}

/* ── COLUMN GROUP TOGGLE ── */
function toggleGrp(g){
  GRP[g]=!GRP[g];
  const btn=document.getElementById('grp-'+g);
  btn.classList.toggle('on',GRP[g]);
  renderHead();renderBody();
}

/* ── DROPDOWNS ── */
function populateDropdowns(){
  const wkRows=rows.filter(r=>r._d[F.wk]===filterWk);
  const ws=document.getElementById('filter-writer'),ps=document.getElementById('filter-pod');
  const cw=ws.value,cp=ps.value;
  const writers=[...new Set(wkRows.map(r=>r._d[F.writer]).filter(Boolean))].sort();
  const pods=[...new Set(wkRows.map(r=>r._d[F.pod]).filter(Boolean))].sort();
  ws.innerHTML='<option value="">All writers</option>'+writers.map(w=>`<option value="${esc(w)}"${cw===w?' selected':''}>${esc(w)}</option>`).join('');
  ps.innerHTML='<option value="">All POD leads</option>'+pods.map(p=>`<option value="${esc(p)}"${cp===p?' selected':''}>${esc(p)}</option>`).join('');
}

/* ── RENDER FILTERS ── */
function renderFilters(){
  const wks=sortedWeeks();
  const el=document.getElementById('filter-pills');
  el.innerHTML=wks.map(w=>`<button class="pill${filterWk===w?' active':''}" data-week="${esc(w)}">${esc(w)}</button>`).join('');
  el.querySelectorAll('.pill').forEach(btn=>btn.addEventListener('click',()=>setFilter(btn.dataset.week)));
  document.getElementById('week-tag').textContent=filterWk||'';
  const hasPrev=prevWeek()!==null;
  const tog=document.getElementById('prev-toggle');
  tog.style.opacity=hasPrev?'1':'0.4';tog.style.pointerEvents=hasPrev?'auto':'none';
}

/* ── RENDER STATS ── */
function renderStats(){
  const list=filtered();
  const run=list.filter(r=>r._d[F.status]==='Running').length;
  const pau=list.filter(r=>r._d[F.status]==='Paused').length;
  const sub=list.reduce((s,r)=>s+(n(r._d[F.sub])||0),0);
  const er=list.reduce((s,r)=>s+(n(r._d[F.er])||0),0);
  const lv=list.reduce((s,r)=>s+(n(r._d[F.live])||0),0);
  const sc=list.reduce((s,r)=>s+(n(r._d[F.i_sc])||0),0);
  const items=[
    {l:'Shows',v:list.length,i:iGrid,c:''},
    {l:'Running',v:run,i:iPlay,c:'sv-green'},
    {l:'Paused',v:pau,i:iPause,c:'sv-amber'},
    {l:'Scripts submitted',v:sub.toLocaleString('en-IN'),i:iFile,c:'sv-blue'},
    {l:'ER approved',v:er,i:iCheck,c:'sv-green'},
    {l:'Live episodes',v:lv,i:iBroadcast,c:''},
    {l:'Scripts to record',v:sc.toLocaleString('en-IN'),i:iGrid,c:''},
  ];
  document.getElementById('stats-grid').innerHTML=items.map(it=>`<div class="stat-card"><div class="stat-icon">${it.i}</div><div class="stat-label">${it.l}</div><div class="stat-value ${it.c}">${it.v}</div></div>`).join('');
}

    <th colspan="5" class="th-base">Show details</th>`;

  }
  if(GRP.km){
    colRow+=`<th class="ch-km" style="width:64px">TTD Scripts (K)</th>`;
    colRow+=`<th class="ch-kmc" style="width:60px">TTD ER (L)</th>`;
    colRow+=`<th class="ch-kmc" style="width:64px">TTD Rel. (M)</th>`;
  }
  if(GRP.sc){
    colRow+=pw?`<th class="ch-ps" style="width:82px;color:var(--purple-t);font-style:italic">◀ Prev script tgt ${pwL}</th>`:'';
    colRow+=`<th class="ch-sc" style="width:84px">Script target <span class="edit-icon">✎</span></th>`;
    colRow+=`<th class="ch-scc" style="width:70px">Submitted</th>`;
    colRow+=`<th class="ch-scc" style="width:74px">Word count</th>`;
  }

    colRow+=pw?`<th class="ch-pe" style="width:82px;color:var(--purple-t);font-style:italic">◀ Prev ER tgt ${pwL}</th>`:'';
    colRow+=`<th class="ch-er" style="width:84px">ER target <span class="edit-icon">✎</span></th>`;
    colRow+=`<th class="ch-erc" style="width:70px">Approved</th>`;

    colRow+=`<th class="ch-prc" style="width:66px">Live eps</th>`;

/* ── RENDER BODY ── */
function renderBody(){
  const list=filtered();
  document.getElementById('row-count').textContent=`Showing ${list.length} shows`;
  document.getElementById('tbody').innerHTML=list.map((row,i)=>{
    const d=row._d;
    const st=d[F.status];
    const badge=st==='Running'?'<span class="badge b-run"><span class="badge-dot"></span>Running</span>':st==='Paused'?'<span class="badge b-pause"><span class="badge-dot"></span>Paused</span>':'<span class="muted">—</span>';
    const jt=getT(row,'jt'),nt=getT(row,'nt'),qt=getT(row,'qt');
    const jD=dirty[`${row._key}_jt`]!==undefined,nD=dirty[`${row._key}_nt`]!==undefined,qD=dirty[`${row._key}_qt`]!==undefined;
    const pr=showPrev?prevRowFor(d[F.show]):null;
    const live=n(d[F.live]),qtN=n(qt);
    const lp=(live!==null&&qtN!==null&&qtN!==0)?live-qtN:null;
    const lpH=lp!==null?`<span class="num" style="color:${lp<0?'var(--red-t)':'var(--green)'}">${lp>0?'+':''}${lp}</span>`:'<span class="muted">—</span>';
    const bg=i%2===0?'':' style="background:var(--sf2)"';
    let cells=`<tr${bg}>
      <td class="left"><span class="show-name" title="${esc(d[F.show])}">${esc(d[F.show])}</span></td>
      <td>${badge}</td>
      <td class="muted num" title="${esc(d[F.writer])}">${esc(d[F.writer])||'—'}</td>
      <td class="muted" title="${esc(d[F.pod])}">${esc(d[F.pod])||'—'}</td>
      <td class="muted" title="${esc(d[F.producer])}">${esc(d[F.producer])||'—'}</td>`;
    if(GRP.ij){
      cells+=`<td class="td-ij num">${fmtN(d[F.i_sc])}</td>`;
      cells+=`<td class="td-ijc num">${fmtN(d[F.j_dur])}</td>`;
    }
    if(GRP.km){
      cells+=`<td class="td-km num">${fmtN(d[F.k_ttd_sc])}</td>`;
      cells+=`<td class="td-kmc num">${fmtN(d[F.l_ttd_er])}</td>`;
      cells+=`<td class="td-kmc num">${fmtN(d[F.m_ttd_rel])}</td>`;
    }
    if(GRP.sc){
      if(showPrev) cells+=`<td class="td-ps"><span class="prev-val">${pr?pr.jt||'—':'—'}</span></td>`;
      cells+=`<td class="td-sc"><div class="edit-cell"><input class="edit-input${jD?' dirty':''}" value="${esc(jt)}" data-key="${row._key}" data-field="jt" oninput="markDirty(this)" onkeydown="keyCheck(event,this)">${jD?`<button class="save-btn" onclick="commitT('${row._key}','jt')">Save</button>`:''}</div></td>`;
      cells+=`<td class="td-scc num-b">${fmt(d[F.sub])}</td>`;
      cells+=`<td class="td-scc num">${fmtWC(d[F.wc])}</td>`;
    }
    if(GRP.er){
      if(showPrev) cells+=`<td class="td-pe"><span class="prev-val">${pr?pr.nt||'—':'—'}</span></td>`;
      cells+=`<td class="td-er"><div class="edit-cell"><input class="edit-input${nD?' dirty':''}" value="${esc(nt)}" data-key="${row._key}" data-field="nt" oninput="markDirty(this)" onkeydown="keyCheck(event,this)">${nD?`<button class="save-btn" onclick="commitT('${row._key}','nt')">Save</button>`:''}</div></td>`;
      cells+=`<td class="td-erc num-b">${fmt(d[F.er])}</td>`;
      cells+=`<td class="td-erc num" style="color:${n(d[F.pend])!==null&&n(d[F.pend])<0?'var(--red-t)':'inherit'}">${fmt(d[F.pend])}</td>`;
    }
    if(GRP.pr){
      if(showPrev) cells+=`<td class="td-pp"><span class="prev-val">${pr?pr.qt||'—':'—'}</span></td>`;
      cells+=`<td class="td-pr"><div class="edit-cell"><input class="edit-input${qD?' dirty':''}" value="${esc(qt)}" data-key="${row._key}" data-field="qt" oninput="markDirty(this)" onkeydown="keyCheck(event,this)">${qD?`<button class="save-btn" onclick="commitT('${row._key}','qt')">Save</button>`:''}</div></td>`;
      cells+=`<td class="td-prc num-b">${fmt(d[F.live])}</td>`;
      cells+=`<td class="td-prc">${lpH}</td>`;
    }
    cells+='</tr>';
    return cells;
  }).join('');
}

function renderWeekly(){renderFilters();populateDropdowns();renderStats();renderHead();renderBody();}
function setFilter(w){filterWk=w;renderWeekly();}
function togglePrev(){showPrev=!showPrev;document.getElementById('prev-toggle').classList.toggle('on',showPrev);renderHead();renderBody();}
function markDirty(el){
  const key=el.dataset.key,field=el.dataset.field;
  dirty[`${key}_${field}`]=el.value;el.classList.add('dirty');
  let btn=el.nextElementSibling;
  if(!btn||btn.tagName!=='BUTTON'){btn=document.createElement('button');btn.className='save-btn';btn.textContent='Save';btn.setAttribute('onclick',`commitT('${key}','${field}')`);el.parentNode.appendChild(btn);}
}
function keyCheck(e,el){if(e.key==='Enter')commitT(el.dataset.key,el.dataset.field);}
function commitT(key,field){
  const k=`${key}_${field}`,val=dirty[k];if(val===undefined)return;
  const row=rows.find(r=>r._key===key);if(row){row[field]=val;delete dirty[k];}
  saveT();renderHead();renderBody();toast('Target saved');
}
function exportCSV(){
  const list=filtered();
  const h=['Production Show ID','Week','Show Name','Status','Writer','POD Lead','Producer',
    'Scripts to Record (I)','Duration Live hrs (J)',
    'TTD Scripts (K)','TTD ER (L)','TTD Release (M)',
    'Script Target','Scripts Submitted','Word Count',
    'ER Target','ER Approved','Approval Pending',
    'Release Target','Live Episodes'];
  const csvRows=[h,...list.map(row=>{
    const d=row._d;
    return[d[F.prod_id],d[F.wk],d[F.show],d[F.status],d[F.writer],d[F.pod],d[F.producer],
      d[F.i_sc],d[F.j_dur],d[F.k_ttd_sc],d[F.l_ttd_er],d[F.m_ttd_rel],
      getT(row,'jt'),d[F.sub],d[F.wc],
      getT(row,'nt'),d[F.er],d[F.pend],
      getT(row,'qt'),d[F.live]];
  })];
  dlCSV(csvRows,`weekly_${(filterWk||'export').replace(/[^a-z0-9]/gi,'_')}_${today()}.csv`);
}

/* ── YEARLY ── */
const YF={id:0,show:1,month:2,msort:3,sub:4,er:5,live:6,wc:7,dur:8};
let yFilterMonth='all',yCmpMonths=[];

function yMonths(){
  return[...new Set(YDATA.map(r=>r[YF.month]))].sort((a,b)=>{
    const sa=YDATA.find(r=>r[YF.month]===a)?.[YF.msort]||'';
    const sb=YDATA.find(r=>r[YF.month]===b)?.[YF.msort]||'';
    return sa.localeCompare(sb);
  });
}
function yFiltered(){
  const q=(document.getElementById('y-search')||{value:''}).value.toLowerCase().trim();
  let months=null;
  if(yCmpMonths.length>=1)months=yCmpMonths;
  else if(yFilterMonth!=='all')months=[yFilterMonth];
  return YDATA.filter(r=>{
    if(months&&!months.includes(r[YF.month]))return false;
    if(q&&!r[YF.show].toLowerCase().includes(q)&&!r[YF.id].toLowerCase().includes(q))return false;
    return true;
  });
}
function clearYCmp(){yCmpMonths=[];yFilterMonth='all';renderYearly();}

function renderYPills(){
  const months=yMonths();
  const el=document.getElementById('y-pills');
  el.innerHTML=months.map(m=>{
    let cls='y-pill';
    if(yCmpMonths[0]===m)cls+=' cmp-a';
    else if(yCmpMonths[1]===m)cls+=' cmp-b';
    else if(yCmpMonths.length===0&&yFilterMonth===m)cls+=' single';
    return`<button class="${cls}" data-m="${esc(m)}">${esc(m)}</button>`;
  }).join('');
  el.querySelectorAll('.y-pill').forEach(btn=>btn.addEventListener('click',()=>{
    const m=btn.dataset.m;
    if(yCmpMonths.includes(m)){
      yCmpMonths=yCmpMonths.filter(x=>x!==m);
      if(yCmpMonths.length===0)yFilterMonth='all';
    } else if(yCmpMonths.length===2){
      yCmpMonths=[yCmpMonths[1],m];
    } else if(yCmpMonths.length===1){
      yCmpMonths=[...yCmpMonths,m];
    } else if(yFilterMonth===m){
      yFilterMonth='all';
    } else if(yFilterMonth!=='all'){
      yCmpMonths=[yFilterMonth,m];yFilterMonth='all';
    } else {
      yFilterMonth=m;
    }
    renderYearly();
  }));
  const isC=yCmpMonths.length===2;
  const bar=document.getElementById('y-cmp-bar');
  bar.style.display=isC?'flex':'none';
  if(isC)document.getElementById('y-cmp-label').textContent=`Comparing ${yCmpMonths[0]} vs ${yCmpMonths[1]}`;
  const hint=document.getElementById('y-hint');
  if(hint){
    if(isC)hint.textContent='Compare mode — click a coloured pill to deselect';
    else if(yFilterMonth!=='all')hint.textContent='Single month — click another to compare';
    else hint.textContent='Click a month to filter · Click 2 to compare';
  }
}

  document.getElementById('ystats').innerHTML=items.map(it=>`<div class="stat-card"><div class="stat-icon">${it.i}</div><div class="stat-label">${it.l}</div><div class="stat-value ${it.c}">${it.v}</div></div>`).join('');
}
const YCOLS=['Scripts submitted','Editorial reviewed','Eps made live','Scripts WC','Live dur. (hr)'];
const YKEYS=[YF.sub,YF.er,YF.live,YF.wc,YF.dur];
const YCLS=['h-sc','h-er','h-lv','h-wc','h-dur'];
function renderYHead(){
  const isC=yCmpMonths.length===2;const[mA,mB]=yCmpMonths;
  let h=`<tr><th class="left" style="width:110px">Show ID</th><th class="left" style="width:200px">Show title</th>`;
  if(isC){YCOLS.forEach((col,i)=>{
    h+=`<th class="${YCLS[i]}" style="min-width:100px">${col}<br><span style="font-size:9px;opacity:.75">${esc(mA)}</span></th>`;
    h+=`<th class="${YCLS[i]}" style="min-width:100px;border-left:1px dashed var(--bds)">${col}<br><span style="font-size:9px;opacity:.75">${esc(mB)}</span></th>`;
    h+=`<th style="min-width:70px;background:#fafaf8;font-size:9px">Diff</th>`;
  });}
  else{YCOLS.forEach((col,i)=>h+=`<th class="${YCLS[i]}" style="min-width:110px">${col}</th>`);}
  h+='</tr>';
  document.getElementById('ythead').innerHTML=h;
}
function renderYBody(){
  const isC=yCmpMonths.length===2;const[mA,mB]=yCmpMonths;
  const list=yFiltered();
  const q=(document.getElementById('y-search')||{value:''}).value.toLowerCase().trim();
  let rows2='';
  if(isC){
    const shows=[...new Set(YDATA.map(r=>r[YF.id]))];
    let cnt=0;
    shows.forEach(sid=>{
      const rA=YDATA.find(r=>r[YF.id]===sid&&r[YF.month]===mA);
      const rB=YDATA.find(r=>r[YF.id]===sid&&r[YF.month]===mB);
      if(!rA&&!rB)return;
      const sn=(rA||rB)[YF.show];
      if(q&&!sn.toLowerCase().includes(q)&&!sid.toLowerCase().includes(q))return;
      cnt++;const bg=cnt%2===0?' style="background:var(--sf2)"':'';
      let cells=`<tr${bg}><td class="left"><span class="yt-id" title="${esc(sid)}">${esc(sid.slice(0,12))}…</span></td><td class="left"><span class="yt-show" title="${esc(sn)}">${esc(sn)}</span></td>`;
      YKEYS.forEach(k=>{
        const vA=rA?rA[k]:0,vB=rB?rB[k]:0,diff=vB-vA,isDur=k===YF.dur;
        const fv=v=>v>0?(isDur?v.toFixed(2):Math.round(v).toLocaleString('en-IN')):'<span class="muted">—</span>';
        const fd=d=>d===0?'<span class="muted">0</span>':`<span style="color:${d>0?'var(--green)':'var(--red-t)'};font-family:'DM Mono',monospace;font-size:10px;font-weight:500">${d>0?'+':''}${isDur?d.toFixed(2):Math.round(d).toLocaleString('en-IN')}</span>`;
        cells+=`<td class="yt-num">${fv(vA)}</td><td class="yt-num" style="border-left:1px dashed var(--bds)">${fv(vB)}</td><td style="background:#fafaf8;text-align:center">${fd(diff)}</td>`;
      });
      rows2+=cells+'</tr>';
    });
    document.getElementById('y-count').textContent=`Showing ${cnt} shows`;
  } else {
    document.getElementById('y-count').textContent=`Showing ${list.length} rows`;
    rows2=list.map((r,i)=>{
      const bg=i%2===0?'':' style="background:var(--sf2)"';
      return`<tr${bg}>
        <td class="left"><span class="yt-id" title="${esc(r[YF.id])}">${esc(r[YF.id].slice(0,12))}…</span></td>
        <td class="left"><span class="yt-show" title="${esc(r[YF.show])}">${esc(r[YF.show])}</span></td>
        <td class="yt-num" style="color:var(--blue-t)">${r[YF.sub]>0?Math.round(r[YF.sub]).toLocaleString('en-IN'):'<span class="muted">—</span>'}</td>
        <td class="yt-num" style="color:var(--green-t)">${r[YF.er]>0?Math.round(r[YF.er]).toLocaleString('en-IN'):'<span class="muted">—</span>'}</td>
        <td class="yt-num" style="color:var(--amber-t)">${r[YF.live]>0?Math.round(r[YF.live]).toLocaleString('en-IN'):'<span class="muted">—</span>'}</td>
        <td class="yt-num" style="color:var(--purple-t)">${r[YF.wc]>0?Math.round(r[YF.wc]).toLocaleString('en-IN'):'<span class="muted">—</span>'}</td>
        <td class="yt-num" style="color:var(--teal-t)">${r[YF.dur]>0?r[YF.dur].toFixed(2):'<span class="muted">—</span>'}</td>
      </tr>`;
    }).join('');
  }
  document.getElementById('ytbody').innerHTML=rows2;
}
function renderYearly(){renderYPills();renderYStats();renderYHead();renderYBody();}
function exportYCSV(){
  const isC=yCmpMonths.length===2;const[mA,mB]=yCmpMonths;
  let h,data2;
  if(isC){
    h=['Show ID','Show Title',...YCOLS.flatMap(c=>[`${c} (${mA})`,`${c} (${mB})`,`${c} Diff`])];
    const shows=[...new Set(YDATA.map(r=>r[YF.id]))];
    const q=(document.getElementById('y-search')||{value:''}).value.toLowerCase().trim();
    data2=[];
    shows.forEach(sid=>{
      const rA=YDATA.find(r=>r[YF.id]===sid&&r[YF.month]===mA);
      const rB=YDATA.find(r=>r[YF.id]===sid&&r[YF.month]===mB);
      if(!rA&&!rB)return;
      const sn=(rA||rB)[YF.show];
      if(q&&!sn.toLowerCase().includes(q)&&!sid.toLowerCase().includes(q))return;
      data2.push([sid,sn,...YKEYS.flatMap(k=>{const vA=rA?rA[k]:0,vB=rB?rB[k]:0;return[vA,vB,vB-vA];})]);
    });
  } else {
    h=['Show ID','Show Title','Month','Scripts Submitted','Editorial Reviewed','Eps Made Live','Scripts WC','Live Duration (hr)'];
    data2=yFiltered().map(r=>[r[YF.id],r[YF.show],r[YF.month],r[YF.sub],r[YF.er],r[YF.live],r[YF.wc],r[YF.dur]]);
  }
  dlCSV([h,...data2],`yearly_${today()}.csv`);
}

/* ── SHARED ── */
function dlCSV(rows3,filename){
  const csv=rows3.map(r=>r.map(v=>{const s=String(v==null?'':v);return(s.includes(',')||s.includes('"'))?`"${s.replace(/"/g,'""')}"`:`${s}`;}).join(',')).join('
');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();toast('CSV downloaded');
}
